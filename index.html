<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAKAI</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/ff00cc/flash-on.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#070012; overflow:hidden; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; }
        body::before { content:""; position:absolute; width:600px; height:600px; background: radial-gradient(circle, rgba(255,0,204,0.1), transparent 70%); filter: blur(120px); right:5%; top:15%; z-index: -1; }
        .card { width:95%; max-width:550px; border-radius:40px; padding:25px; position:relative; background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border:1px solid rgba(255,0,200,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .title { font-size:28px; font-weight:300; color:white; letter-spacing: 5px; text-transform: uppercase; text-align:center; margin-bottom: 20px; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 18px; color: white; outline: none; font-size: 14px; }
        #response { margin-top: 15px; font-size: 11px; color: rgba(255,255,255,0.8); max-height: 380px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; }
        th { background: rgba(255,0,204,0.15); color: #ff00cc; text-align: left; padding: 10px; font-size: 10px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #eee; }
        .neg { color: #ff4d4d !important; }
        .pos { color: #00ff88 !important; }
        .user-tag { position: absolute; top: 15px; right: 30px; font-size: 8px; color: #ff00cc; opacity: 0.7; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="card">
    <div id="user-display" class="user-tag"></div>
    <div class="title">Hakai</div>
    <input type="text" id="user-input" placeholder="Comando..." onkeypress="if(event.key==='Enter') processData()">
    <div id="response">Lista.</div>
</div>

<script>
    const GH_TOKEN = localStorage.getItem('h_gh_token');
    const GIST_ID = localStorage.getItem('h_gist_id');
    const GROQ_KEY = localStorage.getItem('h_groq');
    const USER_NAME = localStorage.getItem('h_user');
    let state = { categorias: {}, historial: [] };

    function applyColors() {
        document.querySelectorAll('td').forEach(cell => {
            const val = cell.innerText;
            if (val.includes('-')) cell.classList.add('neg');
            if (val.includes('+')) cell.classList.add('pos');
        });
    }

    async function loadCloud() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`, { headers: { "Authorization": `token ${GH_TOKEN}` } });
            const data = await res.json();
            state = JSON.parse(data.files["hakai.json"].content);
            document.getElementById('user-display').innerText = USER_NAME;
        } catch (e) { document.getElementById('response').innerText = "Error Cloud."; }
    }

    async function processData() {
        const inputField = document.getElementById('user-input');
        const input = inputField.value;
        const resDiv = document.getElementById('response');
        if (!input) return;

        resDiv.innerHTML = "...";
        await loadCloud();
        const fechaHoy = new Date().toLocaleDateString('es-CL');

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: `IA HAKAI. Usuario: ${USER_NAME}. HOY: ${fechaHoy}.
                        CLASIFICACIÓN DE GASTOS:
                        - Mercaderia: Comida casa, aseo, despensa.
                        - Gastos Fijos: Internet, luz, agua, gas, arriendo, gastos comunes, autopista, gym, celulares.
                        - Ocio: Individual, comer en la calle, gustos personales.
                        - Ahorro: Meta min 60.000.
                        
                        INSTRUCCIONES:
                        1. SI ES PREGUNTA: Solo responde monto. NO guardes.
                        2. SI ES GASTO: Clasifica en el grupo general pero en la columna 'Detalle' del historial escribe el detalle específico (ej: "Comer afuera", "Luz").
                        3. TABLA DETALLE: Solo saldos por grupos generales.
                        4. TABLA COMPLETA: Saldos + Historial: | Fecha | Valor | Nombre | Detalle (Especifico) |.
                        5. JSON tras ###.` },
                        { role: "user", content: `Estado: ${JSON.stringify(state)}. Comando: ${input}` }
                    ],
                    temperature: 0
                }),
            });
            const data = await response.json();
            const rawText = data.choices[0].message.content;
            
            if (rawText.includes('###')) {
                const parts = rawText.split('###');
                const jsonStr = parts[parts.length - 1].trim();
                const cleanJson = jsonStr.substring(jsonStr.indexOf('{'), jsonStr.lastIndexOf('}') + 1);
                const newState = JSON.parse(cleanJson);

                if (JSON.stringify(state.historial) !== JSON.stringify(newState.historial)) {
                    state = newState;
                    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                        method: 'PATCH',
                        headers: { "Authorization": `token ${GH_TOKEN}` },
                        body: JSON.stringify({ files: { "hakai.json": { content: JSON.stringify(state) } } })
                    });
                }
                resDiv.innerHTML = marked.parse(parts[0].trim());
                applyColors();
            } else { resDiv.innerHTML = marked.parse(rawText.trim()); }
            inputField.value = "";
        } catch (e) { resDiv.innerText = "Error."; }
    }
    loadCloud();
</script>
</body>
</html>
