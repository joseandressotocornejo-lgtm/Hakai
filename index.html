<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAKAI</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/ff00cc/flash-on.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/512/ff00cc/flash-on.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#070012; overflow:hidden; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; }
        body::before { content:""; position:absolute; width:600px; height:600px; background: radial-gradient(circle, rgba(255,0,204,0.1), transparent 70%); filter: blur(120px); right:5%; top:15%; z-index: -1; }
        .card { width:95%; max-width:550px; border-radius:40px; padding:25px; position:relative; background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border:1px solid rgba(255,0,200,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .lightning { position:absolute; left:-35px; top:-25px; width:110px; z-index: 2; }
        .lightning path { stroke:#ff00cc; stroke-width:6; fill:none; filter: drop-shadow(0 0 12px #ff00cc); }
        .title { font-size:30px; font-weight:300; color:white; letter-spacing: 6px; text-transform: uppercase; margin-left: 55px; margin-bottom: 5px; }
        .divider { height:1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); margin:15px 0; }
        .input-group { position: relative; display: flex; align-items: center; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 16px 60px 16px 18px; border-radius: 18px; color: white; outline: none; font-size: 14px; }
        .mic-container { position: absolute; right: 18px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mic-ring { width: 10px; height: 10px; border: 1.5px solid rgba(255,0,204,0.4); border-radius: 50%; transition: 0.3s; }
        .active .mic-ring { width: 16px; height: 16px; border-color: #ff00cc; box-shadow: 0 0 10px #ff00cc; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        #response { margin-top: 15px; font-size: 11px; color: rgba(255,255,255,0.8); line-height: 1.4; max-height: 380px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; font-size: 10px; }
        th { background: rgba(255,0,204,0.12); color: #ff00cc; text-align: left; padding: 8px; font-weight: 600; text-transform: uppercase; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #eee; }
        .neg { color: #ff4d4d !important; }
        .pos { color: #00ff88 !important; }
        .btn-fast { display: inline-block; padding: 6px 12px; margin: 8px 5px 0 0; background: rgba(255,0,204,0.1); border: 1px solid rgba(255,0,204,0.3); border-radius: 8px; color: #ff00cc; cursor: pointer; font-size: 10px; }
        .user-tag { position: absolute; top: 15px; right: 35px; font-size: 8px; color: #ff00cc; letter-spacing: 2px; opacity: 0.6; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="card">
    <div id="user-display" class="user-tag"></div>
    <svg class="lightning" viewBox="0 0 100 150"><path d="M60 0 L20 80 L55 80 L35 150 L85 60 L50 60 Z"/></svg>
    <div class="title">Hakai</div>
    <div class="divider"></div>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="Comando..." onkeypress="if(event.key==='Enter') processData()">
        <div class="mic-container" id="mic-toggle" onclick="toggleMic()"><div class="mic-ring"></div></div>
    </div>
    <div id="response">Lista.</div>
</div>

<script>
    const GH_TOKEN = localStorage.getItem('h_gh_token');
    const GIST_ID = localStorage.getItem('h_gist_id');
    const GROQ_KEY = localStorage.getItem('h_groq');
    const USER_NAME = localStorage.getItem('h_user');
    let state = { categorias: {}, historial: [] };

    function applyColors() {
        document.querySelectorAll('td').forEach(cell => {
            const val = cell.innerText;
            if (val.includes('-')) cell.classList.add('neg');
            if (val.includes('+')) cell.classList.add('pos');
        });
    }

    async function loadCloud() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`, { headers: { "Authorization": `token ${GH_TOKEN}` } });
            const data = await res.json();
            state = JSON.parse(data.files["hakai.json"].content);
            document.getElementById('user-display').innerText = USER_NAME;
        } catch (e) { document.getElementById('response').innerText = "Error Cloud."; }
    }

    async function processData(forcedInput = null) {
        const inputField = document.getElementById('user-input');
        const input = forcedInput || inputField.value;
        const resDiv = document.getElementById('response');
        if (!input) return;

        resDiv.innerHTML = "...";
        await loadCloud();
        const fechaHoy = new Date().toLocaleDateString('es-CL');

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: `IA Hakai. Usuario: ${USER_NAME}. HOY: ${fechaHoy}.
                        REGLAS CRÍTICAS:
                        1. SI EL USUARIO PREGUNTA SALDOS (ej: "¿cuánto queda?"): Solo responde el dato. PROHIBIDO modificar el JSON o el historial.
                        2. SI EL USUARIO REGISTRA GASTO/APORTE: Modifica el JSON, resta/suma y guarda. Responde corto.
                        3. PROHIBIDO mostrar tablas de "Cuenta Corriente", "Ahorro" o "Totales". 
                        4. "detalle" -> Solo tabla de saldos por categoría.
                        5. "semanal/mensual" -> Tabla Saldos e Historial: | Fecha | Valor | Nombre | Detalle |.
                        6. En 'Nombre', usa siempre '${USER_NAME}'.
                        7. Gasto: '-', Aporte: '+'. JSON tras ###.` },
                        { role: "user", content: `Estado: ${JSON.stringify(state)}. Comando: ${input}` }
                    ],
                    temperature: 0
                }),
            });
            const data = await response.json();
            const rawText = data.choices[0].message.content;
            
            if (rawText.includes('###')) {
                const parts = rawText.split('###');
                const jsonStr = parts[parts.length - 1].trim();
                const cleanJson = jsonStr.substring(jsonStr.indexOf('{'), jsonStr.lastIndexOf('}') + 1);
                const newState = JSON.parse(cleanJson);

                // SEGURIDAD: Solo guarda si el historial cambió (evita duplicados por preguntas)
                if (JSON.stringify(state.historial) !== JSON.stringify(newState.historial)) {
                    state = newState;
                    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                        method: 'PATCH',
                        headers: { "Authorization": `token ${GH_TOKEN}` },
                        body: JSON.stringify({ files: { "hakai.json": { content: JSON.stringify(state) } } })
                    });
                }
                
                resDiv.innerHTML = marked.parse(parts[0].trim());
                applyColors();
            } else { resDiv.innerHTML = marked.parse(rawText.trim()); }
            inputField.value = "";
        } catch (e) { resDiv.innerText = "Error."; }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-CL';
        recognition.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; processData(); };
        recognition.onend = () => document.getElementById('mic-toggle').classList.remove('active');
    }
    function toggleMic() { if(recognition){ document.getElementById('mic-toggle').classList.add('active'); recognition.start(); } }
    loadCloud();
</script>
</body>
</html>
