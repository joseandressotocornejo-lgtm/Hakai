<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAKAI ELITE V3.1</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/ff00cc/flash-on.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#070012; overflow:hidden; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; }
        body::before { content:""; position:absolute; width:600px; height:600px; background: radial-gradient(circle, rgba(255,0,204,0.1), transparent 70%); filter: blur(120px); right:5%; top:15%; z-index: -1; }
        .card { width:95%; max-width:600px; border-radius:40px; padding:25px; position:relative; background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border:1px solid rgba(255,0,200,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .lightning { position:absolute; left:-35px; top:-25px; width:110px; z-index: 2; }
        .lightning path { stroke:#ff00cc; stroke-width:6; fill:none; filter: drop-shadow(0 0 12px #ff00cc); }
        .title { font-size:30px; font-weight:300; color:white; letter-spacing: 6px; text-transform: uppercase; margin-left: 55px; margin-bottom: 5px; }
        .divider { height:1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); margin:15px 0; }
        .input-group { position: relative; display: flex; align-items: center; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 16px 60px 16px 18px; border-radius: 20px; color: white; outline: none; font-size: 15px; }
        .mic-container { position: absolute; right: 18px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mic-ring { width: 10px; height: 10px; border: 1.5px solid rgba(255,0,204,0.4); border-radius: 50%; }
        .active .mic-ring { width: 16px; height: 16px; border-color: #ff00cc; box-shadow: 0 0 10px #ff00cc; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        #response { margin-top: 15px; font-size: 10px; color: rgba(255,255,255,0.8); line-height: 1.4; max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; background: rgba(0,0,0,0.3); border-radius: 12px; overflow: hidden; }
        th { background: rgba(255,0,204,0.15); color: #ff00cc; text-align: left; padding: 8px; font-size: 9px; text-transform: uppercase; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #eee; vertical-align: middle; }
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.05); margin-top: 5px; border-radius: 10px; }
        .progress-bar { height: 100%; transition: width 0.8s ease; border-radius: 10px; }
        .p-high { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .p-mid { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
        .p-low { background: #ff00cc; box-shadow: 0 0 8px #ff00cc; }
        .neg { color: #ff4d4d !important; font-weight: bold; }
        .pos { color: #00ff88 !important; font-weight: bold; }
        .user-tag { position: absolute; top: 15px; right: 35px; font-size: 8px; color: #ff00cc; opacity: 0.6; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="card">
    <div id="user-display" class="user-tag"></div>
    <svg class="lightning" viewBox="0 0 100 150"><path d="M60 0 L20 80 L55 80 L35 150 L85 60 L50 60 Z"/></svg>
    <div class="title">Hakai</div>
    <div class="divider"></div>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="Comando..." onkeypress="if(event.key==='Enter') { this.blur(); processData(); }">
        <div class="mic-container" id="mic-toggle" onclick="toggleMic()"><div class="mic-ring"></div></div>
    </div>
    <div id="response">Lógica Robusta Activada.</div>
</div>

<script>
    const GH_TOKEN = localStorage.getItem('h_gh_token');
    const GIST_ID = localStorage.getItem('h_gist_id');
    const GROQ_KEY = localStorage.getItem('h_groq');
    const USER_NAME = localStorage.getItem('h_user');
    let state = { categorias: {}, historial: [] };

    const BUDGETS = { "Mercaderia": 150000, "Gastos Fijos": 673700, "Ocio": 100000, "Ahorro": 280000 };

    function applyEnhancements() {
        document.querySelectorAll('td').forEach(cell => {
            if (cell.innerText.includes('-')) cell.classList.add('neg');
            if (cell.innerText.includes('+')) cell.classList.add('pos');
        });

        document.querySelectorAll('tr').forEach(row => {
            const catName = row.cells[0]?.innerText.trim();
            const valCell = row.cells[1];
            if (catName && BUDGETS[catName] && row.cells.length === 2) {
                const current = parseInt(valCell.innerText.replace(/[^0-9-]/g, '')) || 0;
                const total = BUDGETS[catName];
                const pct = Math.max(0, Math.min(100, (current / total) * 100));
                let colorClass = pct < 25 ? 'p-low' : (pct < 60 ? 'p-mid' : 'p-high');
                valCell.innerHTML += `<div class="progress-container"><div class="progress-bar ${colorClass}" style="width: ${pct}%"></div></div>`;
            }
        });
    }

    async function loadCloud() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`, { headers: { "Authorization": `token ${GH_TOKEN}` } });
            const data = await res.json();
            state = JSON.parse(data.files["hakai.json"].content);
            document.getElementById('user-display').innerText = USER_NAME;
            applyEnhancements();
        } catch (e) { document.getElementById('response').innerText = "Error."; }
    }

    async function processData() {
        const inputField = document.getElementById('user-input');
        const input = inputField.value;
        const resDiv = document.getElementById('response');
        if (!input) return;
        resDiv.innerHTML = "...";
        await loadCloud();
        const hoy = new Date().toLocaleDateString('es-CL');

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: `ACTÚA COMO IA HAKAI. NO INVENTES. FECHA: ${hoy}.
                        
                        ESTRUCTURA DE CATEGORÍAS (PROHIBIDO CREAR OTRAS):
                        - Mercaderia (Presupuesto: 150000)
                        - Gastos Fijos (Presupuesto: 673700)
                        - Ocio (Presupuesto: 100000)
                        - Ahorro (Presupuesto: 280000 | Alerta si < 60000)

                        LÓGICA DE COMANDOS:
                        1. "detalle": Responde SOLO con la tabla de saldos actuales.
                        2. "detalle semanal" o "detalle mensual": Tabla de saldos + Tabla de desglose de movimientos del periodo.
                        3. TRANSFERENCIAS: Si detectas "Pasa X de A a B", resta el monto de A y súmalo a B. Registra en historial como "Transferencia interna".
                        4. GASTOS: Clasifica según el tipo (Comida=Mercaderia, Internet=Fijos, Salidas=Ocio). Extrae siempre el detalle específico para el historial.
                        5. REGLA DE ORO: Si no hay monto numérico, no registres nada, solo responde.

                        FORMATO DE SALIDA:
                        Escribe tu respuesta y luego finaliza con el JSON actualizado tras ###.` },
                        { role: "user", content: `Estado: ${JSON.stringify(state)}. Comando: ${input}` }
                    ],
                    temperature: 0
                }),
            });
            const data = await response.json();
            const rawText = data.choices[0].message.content;
            if (rawText.includes('###')) {
                const parts = rawText.split('###');
                state = JSON.parse(parts[parts.length - 1].trim().match(/\{.*\}/s)[0]);
                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: { "Authorization": `token ${GH_TOKEN}` },
                    body: JSON.stringify({ files: { "hakai.json": { content: JSON.stringify(state) } } })
                });
                resDiv.innerHTML = marked.parse(parts[0].trim());
                setTimeout(applyEnhancements, 50);
            } else { resDiv.innerHTML = marked.parse(rawText.trim()); }
            inputField.value = "";
        } catch (e) { resDiv.innerText = "Error."; }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-CL';
        recognition.onresult = (e) => { 
            document.getElementById('user-input').value = e.results[0][0].transcript; 
            document.getElementById('user-input').blur(); 
            processData(); 
        };
        recognition.onend = () => document.getElementById('mic-toggle').classList.remove('active');
    }
    function toggleMic() { if(recognition){ document.getElementById('mic-toggle').classList.add('active'); recognition.start(); } }
    loadCloud();
</script>
</body>
</html>
