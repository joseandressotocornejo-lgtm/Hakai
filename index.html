<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAKAI ELITE</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/ff00cc/flash-on.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#070012; overflow:hidden; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; }
        body::before { content:""; position:absolute; width:600px; height:600px; background: radial-gradient(circle, rgba(255,0,204,0.1), transparent 70%); filter: blur(120px); right:5%; top:15%; z-index: -1; }
        .card { width:95%; max-width:550px; border-radius:40px; padding:25px; position:relative; background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border:1px solid rgba(255,0,200,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .lightning { position:absolute; left:-35px; top:-25px; width:110px; z-index: 2; }
        .lightning path { stroke:#ff00cc; stroke-width:6; fill:none; filter: drop-shadow(0 0 12px #ff00cc); }
        .title { font-size:30px; font-weight:300; color:white; letter-spacing: 6px; text-transform: uppercase; margin-left: 55px; margin-bottom: 5px; }
        .divider { height:1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); margin:15px 0; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 20px; color: white; outline: none; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: #ff00cc; box-shadow: 0 0 15px rgba(255,0,204,0.2); }
        #response { margin-top: 15px; font-size: 11px; color: rgba(255,255,255,0.8); line-height: 1.4; max-height: 380px; overflow-y: auto; }
        
        /* Estilos de Tabla y Barras */
        table { width: 100%; border-collapse: collapse; margin: 10px 0; background: rgba(0,0,0,0.3); border-radius: 15px; overflow: hidden; }
        th { background: rgba(255,0,204,0.15); color: #ff00cc; text-align: left; padding: 10px; font-size: 10px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #eee; position: relative; }
        
        .progress-container { width: 100%; height: 3px; background: rgba(255,255,255,0.05); margin-top: 4px; border-radius: 2px; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 0.5s ease; }
        .p-high { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .p-mid { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
        .p-low { background: #ff00cc; box-shadow: 0 0 8px #ff00cc; }
        
        .neg { color: #ff4d4d !important; font-weight: bold; }
        .pos { color: #00ff88 !important; font-weight: bold; }
        .user-tag { position: absolute; top: 15px; right: 35px; font-size: 8px; color: #ff00cc; letter-spacing: 2px; opacity: 0.6; }
        .alert-box { background: rgba(255,0,77,0.1); border: 1px solid #ff004d; color: #ff4d4d; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 10px; text-align: center; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="card">
    <div id="user-display" class="user-tag"></div>
    <svg class="lightning" viewBox="0 0 100 150"><path d="M60 0 L20 80 L55 80 L35 150 L85 60 L50 60 Z"/></svg>
    <div class="title">Hakai</div>
    <div class="divider"></div>
    <input type="text" id="user-input" placeholder="¿Qué registramos hoy?" onkeypress="if(event.key==='Enter') processData()">
    <div id="response">Sistema listo para reporte.</div>
</div>

<script>
    const GH_TOKEN = localStorage.getItem('h_gh_token');
    const GIST_ID = localStorage.getItem('h_gist_id');
    const GROQ_KEY = localStorage.getItem('h_groq');
    const USER_NAME = localStorage.getItem('h_user');
    let state = { categorias: {}, historial: [] };

    // Presupuestos para las barras de progreso
    const BUDGETS = {
        "Mercaderia": 150000,
        "Gastos Fijos": 673700, // Suma de todos tus fijos (Arriendo, Luz, Gym, etc)
        "Ocio": 100000, // Ajustable
        "Ahorro": 280000
    };

    function applyEnhancements() {
        document.querySelectorAll('td').forEach(cell => {
            const text = cell.innerText;
            if (text.includes('-')) cell.classList.add('neg');
            if (text.includes('+')) cell.classList.add('pos');
        });

        // Lógica de Barras de Progreso (Simulación visual en la tabla)
        const rows = document.querySelectorAll('tr');
        rows.forEach(row => {
            const catCell = row.cells[0];
            const valCell = row.cells[1];
            if (catCell && valCell && BUDGETS[catCell.innerText]) {
                const current = parseInt(valCell.innerText.replace(/[^0-9-]/g, ''));
                const total = BUDGETS[catCell.innerText];
                const pct = Math.max(0, Math.min(100, (current / total) * 100));
                
                let colorClass = 'p-high';
                if (pct < 50) colorClass = 'p-mid';
                if (pct < 20) colorClass = 'p-low';

                valCell.innerHTML += `
                    <div class="progress-container">
                        <div class="progress-bar ${colorClass}" style="width: ${pct}%"></div>
                    </div>`;
            }
        });
    }

    async function loadCloud() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`, { headers: { "Authorization": `token ${GH_TOKEN}` } });
            const data = await res.json();
            state = JSON.parse(data.files["hakai.json"].content);
            document.getElementById('user-display').innerText = USER_NAME;
        } catch (e) { document.getElementById('response').innerText = "Error Cloud."; }
    }

    async function processData() {
        const inputField = document.getElementById('user-input');
        const input = inputField.value;
        const resDiv = document.getElementById('response');
        if (!input) return;

        resDiv.innerHTML = "...";
        await loadCloud();
        const fechaHoy = new Date().toLocaleDateString('es-CL');

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: `IA HAKAI. Usuario: ${USER_NAME}. HOY: ${fechaHoy}.
                        CLASIFICACIÓN:
                        - Mercaderia: Comida, aseo, despensa. (Presupuesto: 150k)
                        - Gastos Fijos: Luz, agua, gas, arriendo, gastos comunes, autopista, gym, celulares. (Presupuesto: 673.7k)
                        - Ocio: Comida calle, individual, gustos. (Presupuesto: 100k)
                        - Ahorro: Meta MIN 60.000. (Presupuesto: 280k inicial)
                        
                        REGLAS:
                        1. SI GASTA: Clasifica en grupo general y pon el detalle real en la columna 'Detalle' (ej: "Luz").
                        2. SI EL AHORRO BAJA DE 60k: Incluye una frase de advertencia al inicio: "⚠️ ALERTA: Ahorro bajo el mínimo".
                        3. TABLAS: "detalle" -> Tabla de Saldos con columnas | Categoría | Saldo |.
                        4. "semanal" -> Tabla Saldos + Tabla Historial Completo.
                        5. JSON tras ###.` },
                        { role: "user", content: `Estado: ${JSON.stringify(state)}. Comando: ${input}` }
                    ],
                    temperature: 0
                }),
            });
            const data = await response.json();
            const rawText = data.choices[0].message.content;
            
            if (rawText.includes('###')) {
                const parts = rawText.split('###');
                const cleanJson = parts[parts.length - 1].trim().substring(parts[parts.length - 1].trim().indexOf('{'), parts[parts.length - 1].trim().lastIndexOf('}') + 1);
                const newState = JSON.parse(cleanJson);

                if (JSON.stringify(state.historial) !== JSON.stringify(newState.historial)) {
                    state = newState;
                    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                        method: 'PATCH',
                        headers: { "Authorization": `token ${GH_TOKEN}` },
                        body: JSON.stringify({ files: { "hakai.json": { content: JSON.stringify(state) } } })
                    });
                }
                resDiv.innerHTML = marked.parse(parts[0].trim());
                applyEnhancements();
            } else { resDiv.innerHTML = marked.parse(rawText.trim()); }
            inputField.value = "";
        } catch (e) { resDiv.innerText = "Error."; }
    }
    loadCloud();
</script>
</body>
</html>
