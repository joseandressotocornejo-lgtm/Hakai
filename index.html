<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAKAI</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/ff00cc/flash-on.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#070012; overflow:hidden; }
        .card { width:95%; max-width:550px; border-radius:40px; padding:25px; position:relative; background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border:1px solid rgba(255,0,200,0.2); }
        .title { font-size:28px; font-weight:300; color:white; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 15px; text-align:center; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 18px; color: white; outline: none; font-size: 14px; }
        #response { margin-top: 20px; font-size: 12px; color: #eee; max-height: 350px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #ff00cc; font-size: 10px; text-transform: uppercase; }
        .neg { color: #ff4d4d; }
        .pos { color: #00ff88; }
        .user-tag { position: absolute; top: 15px; right: 25px; font-size: 9px; color: #ff00cc; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="card">
    <div id="user-display" class="user-tag"></div>
    <div class="title">Hakai</div>
    <input type="text" id="user-input" placeholder="Comando..." onkeypress="if(event.key==='Enter') processData()">
    <div id="response">Lista.</div>
</div>

<script>
    const GH_TOKEN = localStorage.getItem('h_gh_token');
    const GIST_ID = localStorage.getItem('h_gist_id');
    const GROQ_KEY = localStorage.getItem('h_groq');
    const USER_NAME = localStorage.getItem('h_user');
    let state = { categorias: {}, historial: [] };

    async function processData() {
        const inputField = document.getElementById('user-input');
        const input = inputField.value;
        const resDiv = document.getElementById('response');
        if (!input) return;

        resDiv.innerHTML = "...";
        
        // 1. Cargar datos frescos para evitar duplicados por lag
        const res = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`, { headers: { "Authorization": `token ${GH_TOKEN}` } });
        const data = await res.json();
        state = JSON.parse(data.files["hakai.json"].content);
        document.getElementById('user-display').innerText = USER_NAME;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: `IA FINANZAS. Usuario: ${USER_NAME}.
                        REGLAS DE ORO:
                        1. SI ES PREGUNTA (ej: "¿cuánto queda?"): Solo responde el monto. PROHIBIDO crear registros en el historial o modificar saldos.
                        2. SI ES GASTO/APORTE: Registra UNA VEZ, resta/suma y confirma con < 5 palabras.
                        3. FORMATO TABLA: Solo para comandos "detalle", "semanal" o "mensual".
                        4. HISTORIAL: | Fecha | Valor | Nombre | Detalle |.
                        5. RESPUESTA SUCCINTA: Sin explicaciones matemáticas, solo el resultado final.
                        6. JSON obligatorio tras ###.` },
                        { role: "user", content: `Estado Actual: ${JSON.stringify(state)}. Comando: ${input}` }
                    ],
                    temperature: 0
                }),
            });
            const result = await response.json();
            const rawText = result.choices[0].message.content;
            
            if (rawText.includes('###')) {
                const parts = rawText.split('###');
                const cleanJson = parts[parts.length - 1].trim().substring(parts[parts.length - 1].trim().indexOf('{'), parts[parts.length - 1].trim().lastIndexOf('}') + 1);
                const newState = JSON.parse(cleanJson);

                // Solo guardar en GitHub si hubo un cambio real en el historial o saldos
                if (JSON.stringify(state) !== JSON.stringify(newState)) {
                    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                        method: 'PATCH',
                        headers: { "Authorization": `token ${GH_TOKEN}` },
                        body: JSON.stringify({ files: { "hakai.json": { content: JSON.stringify(newState) } } })
                    });
                    state = newState;
                }
                resDiv.innerHTML = marked.parse(parts[0].trim());
            } else { resDiv.innerText = rawText.trim(); }
            inputField.value = "";
        } catch (e) { resDiv.innerText = "Error."; }
    }
</script>
</body>
</html>
